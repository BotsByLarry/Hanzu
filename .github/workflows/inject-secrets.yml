name: Inject Webhooks

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create config with secrets
        run: |
          cat > config.js << 'ENDOFFILE'
          const WEBHOOKS = {
              "rules": "${{ secrets.RULES_WEBHOOK }}",
              "announcements": "${{ secrets.ANNOUNCEMENTS_WEBHOOK }}",
              "events": "${{ secrets.EVENTS_WEBHOOK }}",
              "jb-shop": "${{ secrets.JB_SHOP_WEBHOOK }}",
              "other-shops": "${{ secrets.OTHER_SHOPS_WEBHOOK }}",
              "juicy-deals": "${{ secrets.JUICY_DEALS_WEBHOOK }}",
              "roblox-group": "${{ secrets.ROBLOX_GROUP_WEBHOOK }}"
          };
          ENDOFFILE
      
      - name: Update index.html with webhooks
        run: |
          sed -i 's/const WEBHOOKS = {[^}]*};/const WEBHOOKS = { "rules": "${{ secrets.RULES_WEBHOOK }}", "announcements": "${{ secrets.ANNOUNCEMENTS_WEBHOOK }}", "events": "${{ secrets.EVENTS_WEBHOOK }}", "jb-shop": "${{ secrets.JB_SHOP_WEBHOOK }}", "other-shops": "${{ secrets.OTHER_SHOPS_WEBHOOK }}", "juicy-deals": "${{ secrets.JUICY_DEALS_WEBHOOK }}", "roblox-group": "${{ secrets.ROBLOX_GROUP_WEBHOOK }}" };/' server-index.html
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add server-index.html
          git commit -m "Auto-inject webhooks from secrets" || true
          git push
